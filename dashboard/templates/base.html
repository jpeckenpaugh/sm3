<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Operator Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { padding-top: 60px; }
        .navbar-brand small { font-size: 0.7rem; opacity: 0.6; }
        .stat-card { transition: transform 0.1s; }
        .stat-card:hover { transform: translateY(-2px); }
        .table-monospace td, .table-monospace th { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; }
        .badge-status { font-size: 0.8rem; }
        .sidebar { position: fixed; top: 56px; bottom: 0; left: 0; z-index: 100; padding: 0; width: 220px; }
        .sidebar .nav-link { border-radius: 0; padding: 0.75rem 1rem; color: var(--bs-nav-link-color); }
        .sidebar .nav-link:hover { background: var(--bs-tertiary-bg); }
        .sidebar .nav-link.active { background: var(--bs-primary-bg-subtle); color: var(--bs-primary); }
        .main-content { margin-left: 220px; padding: 1.5rem; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
        .truncate { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .json-block { background: var(--bs-tertiary-bg); padding: 1rem; border-radius: 0.5rem; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-grid-3x3-gap-fill me-2"></i>Operator Dashboard
                <small class="text-secondary">state machine v5</small>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if path == '/' %}active{% endif %}" href="/"><i class="bi bi-speedometer2 me-1"></i>Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/sprints' in path %}active{% endif %}" href="/sprints"><i class="bi bi-arrow-repeat me-1"></i>Sprints</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if path == '/phases' %}active{% endif %}" href="/phases"><i class="bi bi-layers me-1"></i>Phases</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if path == '/dispatch' %}active{% endif %}" href="/dispatch"><i class="bi bi-send me-1"></i>Dispatch</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/profiles' in path %}active{% endif %}" href="/profiles"><i class="bi bi-person-badge me-1"></i>Profiles</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="sidebar d-none d-md-block bg-dark border-end border-secondary">
        <ul class="nav flex-column pt-2">
            <li class="nav-item">
                <a class="nav-link {% if path == '/' %}active{% endif %}" href="/">
                    <i class="bi bi-speedometer2 me-2"></i>Home
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if '/sprints' in path %}active{% endif %}" href="/sprints">
                    <i class="bi bi-arrow-repeat me-2"></i>Sprints
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if path == '/phases' %}active{% endif %}" href="/phases">
                    <i class="bi bi-layers me-2"></i>Phase Runs
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if path == '/dispatch' %}active{% endif %}" href="/dispatch">
                    <i class="bi bi-send me-2"></i>Dispatch Log
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if '/profiles' in path %}active{% endif %}" href="/profiles">
                    <i class="bi bi-person-badge me-2"></i>Profiles
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
