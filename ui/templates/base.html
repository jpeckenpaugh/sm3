<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}genesis-sm Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">genesis-sm</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">Status</a></li>
          <li class="nav-item"><a class="nav-link {% if '/sprints' in request.url.path %}active{% endif %}" href="/sprints">Sprints</a></li>
          <li class="nav-item"><a class="nav-link {% if '/phases' in request.url.path %}active{% endif %}" href="/phases">Phases</a></li>
          <li class="nav-item"><a class="nav-link {% if '/dispatch' in request.url.path %}active{% endif %}" href="/dispatch">Dispatch</a></li>
          <li class="nav-item"><a class="nav-link {% if "/files" in request.url.path %}active{% endif %}" href="/files">Files</a></li>
          <li class="nav-item"><a class="nav-link {% if "/profiles" in request.url.path %}active{% endif %}" href="/profiles">Profiles</a></li>
        </ul>
          <div class="form-check form-switch d-inline-block ms-2" style="margin-left:auto">
            <input class="form-check-input" type="checkbox" id="dash-refresh-toggle" checked onchange="toggleDashRefresh()">
            <label class="form-check-label small text-light" for="dash-refresh-toggle">Auto</label>
          </div>
        {% if databases %}
        <div class="dropdown">
          <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
            {{ active_db_name }}
          </button>
          <ul class="dropdown-menu dropdown-menu-end">
            {% for db in databases %}
              <li><a class="dropdown-item {% if db.name == active_db_name %}active{% endif %}" href="/set_db?name={{ db.name | urlencode }}">{{ db.name }}</a></li>
            {% endfor %}
          </ul>
        </div>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="container-fluid">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
  (function() {
    var KEY = 'genesis-dash-refresh';
    var enabled = localStorage.getItem(KEY) !== 'false';
    function updateUI() {
      var cb = document.getElementById('dash-refresh-toggle');
      if (cb) cb.checked = enabled;
    }
    if (enabled) {
      var interval = 10000;
      var maxInterval = 60000;
      var startTime = Date.now();
      var maxAge = 10 * 60 * 1000;
      var pageVisible = true;
      document.addEventListener('visibilitychange', function() {
        pageVisible = !document.hidden;
      });
      function scheduleReload() {
        var elapsed = Date.now() - startTime;
        if (elapsed >= maxAge) return;
        setTimeout(function() {
          if (enabled && pageVisible) location.reload();
          interval = Math.min(interval * 2, maxInterval);
        }, interval);
      }
      scheduleReload();
    }
    window.toggleDashRefresh = function() {
      enabled = !enabled;
      localStorage.setItem(KEY, enabled);
      if (enabled) location.reload();
    };
    document.addEventListener('DOMContentLoaded', updateUI);
  })();
  </script>

</body>
</html>
